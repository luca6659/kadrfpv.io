<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KADR FPV MOSCOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            line-height: 1.6;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-weight: 600;
            letter-spacing: 2px;
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            opacity: 0.8;
            transition: 0.3s;
        }

        nav a:hover {
            opacity: 1;
        }

        .hero {
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .hero video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .hero-text h1 {
            font-size: 60px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .hero-text p {
            opacity: 0.8;
        }

        .section {
            padding: 120px 40px;
            max-width: 1200px;
            margin: auto;
        }

        .section h2 {
            margin-bottom: 40px;
            font-weight: 600;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .video-grid video {
            width: 100%;
            border-radius: 12px;
            transition: 0.4s;
        }

        .video-grid video:hover {
            transform: scale(1.03);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 12px;
            transition: 0.4s;
            object-fit: cover;
            aspect-ratio: 16/9; /* Делает все превью одинаковой формы */
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .contact {
            text-align: center;
            padding: 100px 20px;
            background: #111;
        }

        .contact a {
            display: block;
            margin: 10px;
            text-decoration: none;
            color: white;
            opacity: 0.8;
            transition: 0.3s;
        }

        .contact a:hover {
            opacity: 1;
        }

        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">KADR FPV</div>
    <nav>
        <a href="#video">Видео</a>
        <a href="#photo">Фото</a>
        <a href="#contact">Контакты</a>
    </nav>
</header>

<section class="hero">
    <video autoplay muted loop playsinline>
        <source src="hero.mp4" type="video/mp4">
    </video>
    <div class="hero-text">
        <h1>FPV AERIAL</h1>
        <p>cinematic drone production</p>
    </div>
</section>

<section class="section" id="video">
    <h2>Видео</h2>
    <div class="video-grid">
        <video controls>
            <source src="video1.mp4" type="video/mp4">
        </video>
        <video controls>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>
</section>

<section class="section" id="photo">
    <h2>Фото</h2>
    <div class="gallery">
        <img src="photo1.jpg.JPG" alt="FPV Photo 1">
        <img src="photo2.jpg.JPG" alt="FPV Photo 2">
        <img src="photo3.jpg.JPG" alt="FPV Photo 3">
        <img src="photo4.jpg.JPG" alt="FPV Photo 4">
    </div>
</section>

<section class="contact" id="contact">
    <h2>Контакты</h2>
    <a href="tel:+79153585459">+7 915 358 54 59</a>
    <a href="tel:+79918736003">+7 991 873 60 03</a>
    <a href="https://t.me/kadr_fpv" target="_blank">Telegram — @kadr_fpv</a>
    <p style="margin-top:20px; opacity:0.6;">Москва</p>
</section>

<footer>
    © 2026 KADR FPV MOSCOW
</footer>

</body>
</html>
