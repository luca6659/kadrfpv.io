<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KADR FPV | Cinematic Production</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0d0d0d;
            --glass: rgba(20, 20, 20, 0.7);
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Полупрозрачная шапка */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--accent);
        }

        .logo {
            font-weight: 500;
            letter-spacing: 3px;
            font-size: 13px;
            text-transform: uppercase;
        }

        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--text);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.6;
            transition: 0.3s;
        }

        nav a:hover { opacity: 1; }

        /* Hero секция */
        .hero {
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            text-align: center;
        }

        .hero video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
            filter: brightness(0.5);
        }

        .hero-text h1 {
            font-size: clamp(32px, 6vw, 64px);
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .hero-text p {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* Разделы */
        .section {
            padding: 100px 10%;
            max-width: 1400px;
            margin: auto;
        }

        h2 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 50px;
            letter-spacing: -0.5px;
            color: #f0f0f0;
        }

        /* Статистика с растущими цифрами */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 30px;
            padding: 40px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border: 1px solid var(--accent);
        }

        .stat-card { text-align: center; }
        
        .stat-number {
            display: block;
            font-size: 36px;
            font-weight: 300;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.4;
        }

        /* Видео и Фото */
        .video-item { margin-bottom: 40px; position: relative; }
        
        video, img {
            width: 100%;
            border-radius: 8px;
            transition: transform 0.5s ease;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        img:hover { transform: scale(1.02); }

        /* Контакты */
        .contact-card {
            background: #151515;
            padding: 60px;
            border-radius: 20px;
            text-align: center;
        }

        .phone-link {
            display: block;
            font-size: 28px;
            color: white;
            text-decoration: none;
            margin-bottom: 15px;
            font-weight: 300;
        }

        .tg-btn {
            display: inline-flex;
            align-items: center;
            margin-top: 20px;
            padding: 12px 25px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-size: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .tg-btn:hover { background: white; color: black; }

        footer {
            padding: 50px;
            text-align: center;
            font-size: 10px;
            opacity: 0.3;
            letter-spacing: 1px;
        }

        /* Анимация появления */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: 0.8s ease forwards;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            nav { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">KADR FPV</div>
    <nav>
        <a href="#about">О нас</a>
        <a href="#video">Работы</a>
        <a href="#photo">Галерея</a>
        <a href="#contact">Связь</a>
    </nav>
</header>

<section class="hero">
    <video autoplay muted loop playsinline>
        <source src="hero.mp4" type="video/mp4">
    </video>
    <div class="hero-text">
        <h1>KADR FPV MOSCOW</h1>
        <p>Premium Drone Production</p>
    </div>
</section>

<section class="section" id="about">
    <div class="stats-grid fade-in">
        <div class="stat-card">
            <span class="stat-number" data-target="150">0</span>
            <span class="stat-label">КМ/Ч СКОРОСТЬ</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" data-target="500">0</span>
            <span class="stat-label">ЧАСОВ НАЛЕТА</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" data-target="100">0</span>
            <span class="stat-label">ПРОЕКТОВ</span>
        </div>
    </div>
</section>

<section class="section" id="video">
    <h2 class="fade-in">Selected Works</h2>
    <div class="video-item fade-in">
        <video controls><source src="video1.mp4" type="video/mp4"></video>
    </div>
    <div class="video-item fade-in">
        <video controls><source src="video2.mp4" type="video/mp4"></video>
    </div>
</section>

<section class="section" id="photo">
    <h2 class="fade-in">Gallery</h2>
    <div class="gallery fade-in">
        <img src="photo1.jpg.JPG" alt="FPV 1">
        <img src="photo2.jpg.JPG" alt="FPV 2">
        <img src="photo3.jpg.JPG" alt="FPV 3">
        <img src="photo4.jpg.JPG" alt="FPV 4">
    </div>
</section>

<section class="section" id="contact">
    <div class="contact-card fade-in">
        <h2>Start a Project</h2>
        <a href="tel:+79153585459" class="phone-link">+7 915 358 54 59</a>
        <a href="tel:+79918736003" class="phone-link">+7 991 873 60 03</a>
        <a href="https://t.me/kadr_fpv" class="tg-btn" target="_blank">НАПИСАТЬ В TELEGRAM</a>
    </div>
</section>

<footer>
    © 2026 KADR FPV MOSCOW — CREATED WITH PASSION
</footer>

<script>
    // Скрипт для анимации появления блоков
    const observerOptions = { threshold: 0.2 };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                // Если это блок со статистикой, запускаем счетчик
                if (entry.target.classList.contains('stats-grid')) {
                    startCounters();
                }
            }
        });
    }, observerOptions);

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // Функция счетчика
    function startCounters() {
        const counters = document.querySelectorAll('.stat-number');
        counters.forEach(counter => {
            const target = +counter.getAttribute('data-target');
            const count = +counter.innerText;
            const speed = target / 100;

            const updateCount = () => {
                const current = +counter.innerText;
                if (current < target) {
                    counter.innerText = Math.ceil(current + speed);
                    setTimeout(updateCount, 20);
                } else {
                    counter.innerText = target + (target === 150 ? "" : "+");
                }
            };
            updateCount();
        });
    }
</script>

</body>
</html>
